name: kairos
services:
  control-plane:
    environment:
      NODE_ENV: production
      BUILD_TARGET: prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  cognition:
    environment:
      BUILD_TARGET: prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    environment:
      NODE_ENV: production
      BUILD_TARGET: prod
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  postgres:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  vault:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

networks:
  kairos-internal:
    internal: true
